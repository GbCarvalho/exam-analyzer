[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "exam-analyzer"
version = "0.1.0"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--ignore=tests/benchmark"
asyncio_mode = "auto"

[tool.pytest.ini_options.markers]
benchmark = "Real-world benchmark tests using actual PDF assets. Run with: pytest tests/benchmark/ -v -s --no-header"
